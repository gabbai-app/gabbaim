<script>
// ============== Global state ==============
window.STATE = {
  synagogues: [],
  currentSynagogue: null,
  members: [],
  page: 'dashboard'
};

// ============== Server bridge ==============
function gCall(fn, args, cb) {
  google.script.run
    .withSuccessHandler(function(res){
      if (!res || !res.ok) {
        console.error('Server error', fn, res);
        showBanner((res && res.error) || 'שגיאה בשרת', 'danger');
        if (cb) cb(null);
        return;
      }
      if (cb) cb(res.data);
    })
    .withFailureHandler(function(err){
      console.error('Comm error', err);
      showBanner('שגיאת תקשורת: ' + err.message, 'danger');
      if (cb) cb(null);
    })
    .gCall(fn, args || {});
}

function showBanner(msg, type) {
  type = type || 'info';
  var b = document.getElementById('banner');
  b.className = 'alert alert-' + type + ' alert-dismissible m-2';
  document.getElementById('bannerMsg').textContent = msg;
  b.classList.remove('d-none');
  setTimeout(function(){ b.classList.add('d-none'); }, 5000);
}

// ============== Boot ==============
function bootApp() {
  gCall('ensureInit', {}, function(){
    gCall('listSynagogues', {}, function(syns) {
      STATE.synagogues = syns || [];
      STATE.currentSynagogue = (syns && syns[0] && syns[0].id) || 'sg1';
      renderSynSelector();
      renderPage(window.CURRENT_PAGE);
    });
  });
}

function renderSynSelector() {
  var sel = document.getElementById('synSelector');
  sel.innerHTML = STATE.synagogues.map(function(s){
    return '<option value="'+s.id+'">'+escHtml(s.name)+'</option>';
  }).join('');
  sel.value = STATE.currentSynagogue;
  sel.onchange = function() {
    STATE.currentSynagogue = sel.value;
    renderPage(STATE.page);
  };
}

function renderPage(page) {
  STATE.page = page;
  var content = document.getElementById('mainContent');
  var pageFns = {
    dashboard: renderDashboard,
    live_mode: renderLiveMode,
    members: renderMembers,
    member_card: renderMemberCard,
    events: renderEvents,
    reports: renderReports,
    settings: renderSettings
  };
  var fn = pageFns[page] || renderDashboard;
  fn(content);
}

// ============== Utils ==============
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function initials(first, last) {
  return (String(first||'').substring(0,1) + String(last||'').substring(0,1)) || '?';
}

function avatarColor(s) {
  var colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
  var sum = 0;
  for (var i = 0; i < (s||'').length; i++) sum += s.charCodeAt(i);
  return colors[sum % colors.length];
}

function avatarHtml(m, size) {
  size = size || '';
  var color = avatarColor(m.id || (m.first_name+m.last_name));
  return '<span class="avatar '+size+'" style="background:'+color+'">'+escHtml(initials(m.first_name, m.last_name))+'</span>';
}

function tribeBadge(t) {
  if (!t) t = 'ישראל';
  return '<span class="tribe-badge tribe-'+t+'">'+t+'</span>';
}

function fmtDate(s) {
  if (!s) return '—';
  return String(s).substring(0,10).split('-').reverse().join('/');
}

function daysSince(s) {
  if (!s || s === '—') return '—';
  var ms = new Date() - new Date(s);
  var d = Math.floor(ms / 86400000);
  if (d < 0) return '—';
  if (d === 0) return 'היום';
  if (d === 1) return 'אתמול';
  if (d < 30) return d + ' ימים';
  if (d < 365) return Math.floor(d/30) + ' חודשים';
  return Math.floor(d/365) + ' שנים';
}

// ============== Modal helper ==============
function showModal(title, bodyHtml, footerHtml) {
  var html = '<div class="modal fade" id="appModal" tabindex="-1">'+
    '<div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">'+
    '<div class="modal-content">'+
    '<div class="modal-header"><h5 class="modal-title">'+title+'</h5>'+
    '<button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>'+
    '<div class="modal-body">'+bodyHtml+'</div>'+
    (footerHtml ? '<div class="modal-footer">'+footerHtml+'</div>' : '')+
    '</div></div></div>';
  document.getElementById('modalContainer').innerHTML = html;
  var m = new bootstrap.Modal(document.getElementById('appModal'));
  m.show();
  return m;
}

// ============== DASHBOARD ==============
function renderDashboard(el) {
  el.innerHTML = '<div class="row g-3"><div class="col-12"><div class="card"><div class="card-body skeleton" style="height:130px;"></div></div></div></div>';
  gCall('dashboardSummary', {synagogue_id: STATE.currentSynagogue}, function(d) {
    if (!d) return;
    var hb = d.shabbat;
    el.innerHTML =
      '<div class="day-banner">'+
        '<div class="d-flex align-items-center justify-content-between flex-wrap">'+
          '<div>'+
            '<div class="parsha-name">פרשת '+escHtml(hb.parsha||'—')+'</div>'+
            '<div class="hebrew-date">'+escHtml(hb.hebrew.display)+'</div>'+
            '<div class="greg-date">'+fmtDate(hb.date)+' · '+escHtml(hb.day_of_week_name)+' · '+escHtml(hb.aliyot_count)+' עליות</div>'+
          '</div>'+
          '<a href="?page=live_mode" class="btn btn-light btn-lg fw-bold mt-2">'+
            '<i class="bi bi-lightning-fill"></i> פתח מצב חי</a>'+
        '</div>'+
      '</div>'+
      '<div class="row g-3 mb-3">'+
        statCard('חיובים השבת', d.obligations.length, 'bi-calendar-event', 'stat-card') +
        statCard('מתפללים פעילים', d.members_total, 'bi-people-fill', 'stat-card-green') +
        statCard('עליות (30 יום)', d.aliyot_last_30, 'bi-book', 'stat-card-purple') +
        statCard('לא עלו 90+ יום', d.long_absent_top.length+'+', 'bi-clock-history', 'stat-card-orange') +
      '</div>'+
      '<div class="row g-3">'+
        '<div class="col-lg-6"><div class="card"><div class="card-header"><i class="bi bi-exclamation-circle text-warning"></i> חיובים השבת</div><div class="card-body" id="dashObs"></div></div></div>'+
        '<div class="col-lg-6"><div class="card"><div class="card-header"><i class="bi bi-clock-history text-danger"></i> לא עלו זמן רב</div><div class="card-body" id="dashAbsent"></div></div></div>'+
      '</div>'+
      '<div class="row g-3 mt-1">'+
        '<div class="col-12"><div class="card"><div class="card-header"><i class="bi bi-list"></i> עליות אחרונות</div><div class="card-body" id="dashRecent"></div></div></div>'+
      '</div>';

    var dashObs = document.getElementById('dashObs');
    dashObs.innerHTML = d.obligations.length ? d.obligations.map(function(e){
      var m = e._member || {};
      return '<div class="member-row">'+avatarHtml(m)+
        '<div class="info"><div class="name">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</div>'+
        '<div class="meta">'+escHtml(e.type)+' · '+fmtDate(e._upcoming||e.relevant_shabbat)+'</div></div>'+
        tribeBadge(m.tribe)+'</div>';
    }).join('') : emptyState('אין חיובים השבוע');

    var dashAbsent = document.getElementById('dashAbsent');
    dashAbsent.innerHTML = d.long_absent_top.length ? d.long_absent_top.map(function(m){
      return '<div class="member-row">'+avatarHtml(m)+
        '<div class="info"><div class="name">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</div>'+
        '<div class="meta">עלייה אחרונה: '+(m.last_aliyah_date==='מעולם לא'?'מעולם לא':fmtDate(m.last_aliyah_date))+'</div></div>'+
        tribeBadge(m.tribe)+'</div>';
    }).join('') : emptyState('כולם עלו לאחרונה');

    var dashRecent = document.getElementById('dashRecent');
    dashRecent.innerHTML = d.recent_aliyot.length ? '<div class="table-responsive"><table class="table table-sm align-middle">'+
      '<thead><tr><th>תאריך</th><th>עלייה</th><th>מתפלל</th><th>סיבה</th></tr></thead><tbody>'+
      d.recent_aliyot.map(function(a){
        var m = a._member || {};
        return '<tr><td>'+fmtDate(a.date)+'</td><td><b>'+escHtml(a.aliyah_name)+'</b></td>'+
          '<td>'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</td>'+
          '<td><small class="text-muted">'+escHtml(a.reason||'—')+'</small></td></tr>';
      }).join('')+'</tbody></table></div>' : emptyState('אין רישומי עליות עדיין');
  });
}

function statCard(label, value, icon, klass) {
  return '<div class="col-6 col-md-3"><div class="stat-card '+klass+'">'+
    '<div class="d-flex justify-content-between"><div><div class="stat-value">'+value+'</div>'+
    '<div class="stat-label">'+label+'</div></div>'+
    '<i class="bi '+icon+'" style="font-size:2rem;opacity:0.5;"></i></div></div></div>';
}

function emptyState(msg, icon) {
  return '<div class="empty-state"><i class="bi '+(icon||'bi-inbox')+'"></i><p class="mt-2 mb-0">'+escHtml(msg)+'</p></div>';
}

// ============== LIVE MODE ==============
function renderLiveMode(el) {
  el.innerHTML = '<div class="card"><div class="card-body skeleton" style="height:300px;"></div></div>';
  var date = (PARAMS && PARAMS.date) || new Date().toISOString().substring(0,10);
  // snap to next saturday if today is not shabbat
  var d = new Date(date);
  while (d.getDay() !== 6) d.setDate(d.getDate()+1);
  date = d.toISOString().substring(0,10);

  gCall('thisWeekShabbat', {date: date}, function(info) {
    gCall('reportShabbatRecap', {date: date, synagogue_id: STATE.currentSynagogue}, function(filled) {
      gCall('eventsForShabbat', {date: date, synagogue_id: STATE.currentSynagogue}, function(events) {
        renderLiveModeContent(el, info, filled || [], events || []);
      });
    });
  });
}

function renderLiveModeContent(el, info, filled, events) {
  var filledMap = {};
  filled.forEach(function(a){ filledMap[a.aliyah_name] = a; });

  var html = '<div class="day-banner">'+
    '<div class="parsha-name"><i class="bi bi-lightning-fill"></i> מצב חי — פרשת '+escHtml(info.parsha||'')+'</div>'+
    '<div class="hebrew-date">'+escHtml(info.hebrew.display)+'</div>'+
    '<div class="greg-date">'+fmtDate(info.date)+' · '+escHtml(info.day_of_week_name)+'</div>'+
    '</div>';

  if (events.length) {
    html += '<div class="card mb-3"><div class="card-header bg-warning text-dark"><i class="bi bi-exclamation-circle"></i> חיובים השבת ('+events.length+')</div><div class="card-body">';
    events.forEach(function(e){
      var m = e._member || {};
      html += '<div class="member-row" style="background:#fffbe6;">'+avatarHtml(m)+
        '<div class="info"><div class="name">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</div>'+
        '<div class="meta">'+escHtml(e.type)+'</div></div>'+
        tribeBadge(m.tribe)+
        '<button class="btn btn-sm btn-success" onclick="quickAssignFromObligation(\''+e.id+'\',\''+e.member_id+'\')">' +
        '<i class="bi bi-check-lg"></i> שייך לעלייה</button></div>';
    });
    html += '</div></div>';
  }

  html += '<div class="card"><div class="card-header"><i class="bi bi-book"></i> '+info.aliyot_count+' עליות</div><div class="card-body">';
  info.aliyot_names.forEach(function(name, i) {
    var f = filledMap[name];
    html += '<div class="aliyah-slot '+(f ? 'filled' : 'empty')+'" data-aliyah="'+name+'" data-order="'+(i+1)+'" onclick="openSlotPicker(\''+name+'\','+(i+1)+',\''+info.date+'\')">'+
      '<div class="d-flex align-items-center">'+
      '<div class="slot-name me-3" style="min-width:90px;">'+escHtml(name)+'</div>';
    if (f) {
      var m = filled.find(function(x){return x.member_id === f.member_id;});
      var mObj = (m && m._member) || {};
      html += avatarHtml(mObj) +
        '<div class="info ms-2"><div class="member-name">'+escHtml((mObj.first_name||'?')+' '+(mObj.last_name||''))+'</div>'+
        '<div class="meta">'+escHtml(f.reason||'')+' · '+escHtml(f.channel||'web')+'</div></div>' +
        '<button class="btn btn-sm btn-outline-danger ms-auto" onclick="event.stopPropagation();removeAliyah(\''+f.id+'\',\''+info.date+'\')"><i class="bi bi-x"></i></button>';
    } else {
      html += '<div class="text-muted"><i class="bi bi-plus-circle"></i> לחץ לבחור מתפלל</div>';
    }
    html += '</div></div>';
  });
  html += '</div></div>';

  el.innerHTML = html;
}

function openSlotPicker(aliyahName, order, date) {
  var bodyHtml = '<div class="search-bar"><input type="text" id="slotSearch" class="form-control form-control-lg" placeholder="🔍 חפש מתפלל…" autofocus></div>'+
    '<div id="slotSuggested" class="mb-2"><h6 class="text-muted mt-2">המלצות (לא עלו זמן רב):</h6><div class="pick-list" id="suggList"><div class="skeleton" style="height:200px;"></div></div></div>';
  showModal('בחר מתפלל לעליית ' + escHtml(aliyahName), bodyHtml);

  gCall('suggestForSlot', {date: date, synagogue_id: STATE.currentSynagogue, aliyah_name: aliyahName}, function(sugg){
    var listEl = document.getElementById('suggList');
    if (!sugg || !sugg.length) { listEl.innerHTML = emptyState('אין הצעות מתאימות'); return; }
    listEl.innerHTML = sugg.map(function(m){
      return memberPickRow(m, function() {
        return 'pickAndAssign(\''+m.id+'\',\''+aliyahName+'\','+order+',\''+date+'\')';
      });
    }).join('');
  });

  document.getElementById('slotSearch').addEventListener('input', function(e){
    var q = e.target.value.trim();
    if (q.length < 1) {
      document.getElementById('slotSuggested').innerHTML = '<h6 class="text-muted mt-2">המלצות:</h6><div class="pick-list" id="suggList"></div>';
      gCall('suggestForSlot', {date: date, synagogue_id: STATE.currentSynagogue, aliyah_name: aliyahName}, function(sugg){
        document.getElementById('suggList').innerHTML = (sugg||[]).map(function(m){
          return memberPickRow(m, function() {
            return 'pickAndAssign(\''+m.id+'\',\''+aliyahName+'\','+order+',\''+date+'\')';
          });
        }).join('') || emptyState('אין הצעות');
      });
      return;
    }
    gCall('searchMembersByName', {q: q}, function(res){
      document.getElementById('slotSuggested').innerHTML = '<h6 class="text-muted mt-2">תוצאות חיפוש:</h6><div class="pick-list" id="suggList"></div>';
      var list = document.getElementById('suggList');
      // tribe filter
      var filtered = (res||[]).filter(function(m){
        if (aliyahName === 'כהן') return m.tribe === 'כהן';
        if (aliyahName === 'לוי') return m.tribe === 'לוי';
        return m.tribe === 'ישראל' || !m.tribe;
      });
      list.innerHTML = filtered.map(function(m){
        return memberPickRow(m, function() {
          return 'pickAndAssign(\''+m.id+'\',\''+aliyahName+'\','+order+',\''+date+'\')';
        });
      }).join('') || emptyState('לא נמצא');
    });
  });
}

function memberPickRow(m, onclickFn) {
  return '<div class="member-row" onclick="'+onclickFn()+'">'+
    avatarHtml(m)+
    '<div class="info"><div class="name">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</div>'+
    '<div class="meta">עלייה אחרונה: '+(m._lastDate && m._lastDate!=='0000-00-00' ? fmtDate(m._lastDate)+' ('+daysSince(m._lastDate)+')' : 'מעולם לא')+'</div></div>'+
    tribeBadge(m.tribe)+'</div>';
}

function pickAndAssign(memberId, aliyahName, order, date) {
  gCall('logAliyah', {
    member_id: memberId,
    synagogue_id: STATE.currentSynagogue,
    aliyah_name: aliyahName,
    aliyah_order: order,
    date: date,
    channel: 'web',
    reason: 'רוטציה'
  }, function(){
    showBanner('העלייה נרשמה!', 'success');
    bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
    renderLiveMode(document.getElementById('mainContent'));
  });
}

function quickAssignFromObligation(eventId, memberId) {
  // pick a slot
  var bodyHtml = '<p>בחר עלייה לחיוב זה:</p>'+
    '<div class="d-flex flex-wrap gap-2" id="slotBtns"></div>';
  showModal('שייך עלייה לחיוב', bodyHtml);
  var info = document.querySelectorAll('.aliyah-slot');
  var btns = '';
  info.forEach(function(slot) {
    if (slot.classList.contains('filled')) return;
    var n = slot.dataset.aliyah;
    var o = slot.dataset.order;
    btns += '<button class="btn btn-outline-primary" onclick="assignObligation(\''+eventId+'\',\''+memberId+'\',\''+n+'\','+o+')">'+escHtml(n)+'</button>';
  });
  document.getElementById('slotBtns').innerHTML = btns || '<p class="text-muted">כל העליות תפוסות.</p>';
}

function assignObligation(eventId, memberId, aliyahName, order) {
  var date = document.querySelector('.day-banner .greg-date').textContent.split(' · ')[0].split('/').reverse().join('-');
  gCall('logAliyah', {
    member_id: memberId,
    synagogue_id: STATE.currentSynagogue,
    aliyah_name: aliyahName,
    aliyah_order: order,
    date: date,
    channel: 'web',
    reason: 'חיוב',
    event_id: eventId
  }, function(){
    showBanner('שובץ!', 'success');
    bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
    renderLiveMode(document.getElementById('mainContent'));
  });
}

function removeAliyah(id, date) {
  if (!confirm('להסיר עלייה זו?')) return;
  gCall('deleteAliyah', {id: id}, function(){
    showBanner('הוסר', 'info');
    renderLiveMode(document.getElementById('mainContent'));
  });
}

// ============== MEMBERS ==============
function renderMembers(el) {
  el.innerHTML = '<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">'+
    '<h3 class="mb-0"><i class="bi bi-people-fill"></i> מתפללים</h3>'+
    '<div class="d-flex gap-2">'+
      '<input type="text" id="memSearch" class="form-control" placeholder="🔍 חיפוש…" style="min-width:200px;">'+
      '<select id="memTribe" class="form-select" style="width:auto;"><option value="">כל השבטים</option><option>כהן</option><option>לוי</option><option>ישראל</option></select>'+
      '<button class="btn btn-primary" onclick="openAddMember()"><i class="bi bi-plus-lg"></i> הוסף</button>'+
    '</div></div>'+
    '<div class="card"><div class="card-body p-2"><div id="memList"><div class="skeleton" style="height:300px;"></div></div></div></div>';

  loadMembersList();
  document.getElementById('memSearch').addEventListener('input', loadMembersList);
  document.getElementById('memTribe').addEventListener('change', loadMembersList);
}

function loadMembersList() {
  var args = {synagogue_id: STATE.currentSynagogue, status: 'active'};
  var q = document.getElementById('memSearch').value.trim();
  var tribe = document.getElementById('memTribe').value;
  if (q) args.search = q;
  if (tribe) args.tribe = tribe;
  gCall('listMembers', args, function(members) {
    var listEl = document.getElementById('memList');
    if (!members.length) { listEl.innerHTML = emptyState('אין מתפללים. הוסף את הראשון!'); return; }
    listEl.innerHTML = '<div class="row g-2">' + members.map(function(m){
      return '<div class="col-md-6 col-lg-4"><div class="member-row" onclick="openMember(\''+m.id+'\')">'+
        avatarHtml(m)+
        '<div class="info"><div class="name">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</div>'+
        '<div class="meta">'+(m.father_name?'בן '+escHtml(m.father_name):'')+'</div></div>'+
        tribeBadge(m.tribe)+'</div></div>';
    }).join('') + '</div>';
  });
}

function openAddMember() {
  var bodyHtml =
    '<form id="memForm"><div class="row g-3">'+
    '<div class="col-md-6"><label class="form-label">שם פרטי *</label><input class="form-control" name="first_name" required></div>'+
    '<div class="col-md-6"><label class="form-label">שם משפחה</label><input class="form-control" name="last_name"></div>'+
    '<div class="col-md-6"><label class="form-label">שם האב</label><input class="form-control" name="father_name"></div>'+
    '<div class="col-md-6"><label class="form-label">שבט *</label><select class="form-select" name="tribe">'+
      '<option value="ישראל">ישראל</option><option value="כהן">כהן</option><option value="לוי">לוי</option></select></div>'+
    '<div class="col-md-6"><label class="form-label">טלפון</label><input class="form-control" name="phone"></div>'+
    '<div class="col-md-6"><label class="form-label">בית כנסת ראשי</label><select class="form-select" name="primary_synagogue_id">'+
      STATE.synagogues.map(function(s){return '<option value="'+s.id+'" '+(s.id===STATE.currentSynagogue?'selected':'')+'>'+escHtml(s.name)+'</option>';}).join('')+
      '</select></div>'+
    '<div class="col-12"><label class="form-label">הערות</label><textarea class="form-control" name="notes" rows="2"></textarea></div>'+
    '</div></form>';
  var footer = '<button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>'+
    '<button class="btn btn-primary" onclick="saveMember()">שמור</button>';
  showModal('הוסף מתפלל', bodyHtml, footer);
}

function saveMember() {
  var f = document.getElementById('memForm');
  var data = {};
  Array.from(f.elements).forEach(function(el){
    if (el.name) data[el.name] = el.value;
  });
  if (!data.first_name) { alert('שם פרטי חובה'); return; }
  gCall('addMember', data, function(){
    showBanner('נוסף!', 'success');
    bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
    loadMembersList();
  });
}

function openMember(id) {
  window.location.href = '?page=member_card&id=' + id;
}

// ============== MEMBER CARD ==============
function renderMemberCard(el) {
  var id = PARAMS && PARAMS.id;
  if (!id) { el.innerHTML = '<a href="?page=members" class="btn btn-link">→ חזור למתפללים</a>'; return; }
  el.innerHTML = '<div class="skeleton" style="height:200px;"></div>';
  gCall('getMember', {id: id}, function(m){
    if (!m) { el.innerHTML = '<p>מתפלל לא נמצא</p>'; return; }
    gCall('memberStats', {id: id}, function(stats){
      var html = '<a href="?page=members" class="btn btn-link mb-2">← חזרה</a>'+
      '<div class="card mb-3"><div class="card-body"><div class="d-flex align-items-center gap-3">'+
        avatarHtml(m, 'avatar-lg')+
        '<div class="flex-grow-1"><h3 class="mb-1">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</h3>'+
        '<div class="text-muted">'+(m.father_name?'בן '+escHtml(m.father_name)+' · ':'')+tribeBadge(m.tribe)+
        (m.phone?' · <i class="bi bi-telephone"></i> '+escHtml(m.phone):'')+'</div></div>'+
        '<div class="btn-group"><button class="btn btn-outline-primary" onclick="openEditMember(\''+m.id+'\')"><i class="bi bi-pencil"></i> ערוך</button>'+
        '<button class="btn btn-outline-success" onclick="addEventForMember(\''+m.id+'\')"><i class="bi bi-calendar-plus"></i> הוסף אירוע</button></div></div></div></div>'+
      '<div class="row g-3 mb-3">'+
        statCard('סך עליות', stats.total, 'bi-book', 'stat-card')+
        statCard('30 יום', stats.last_30, 'bi-calendar-week', 'stat-card-green')+
        statCard('90 יום', stats.last_90, 'bi-calendar-month', 'stat-card-purple')+
        statCard('שנה', stats.last_year, 'bi-calendar', 'stat-card-orange')+
      '</div>'+
      '<div class="card"><div class="card-header">היסטוריית עליות</div><div class="card-body">'+
      (stats.recent.length ? '<div class="table-responsive"><table class="table"><thead><tr><th>תאריך</th><th>עלייה</th><th>סיבה</th><th>הערה</th></tr></thead><tbody>'+
        stats.recent.map(function(a){
          return '<tr><td>'+fmtDate(a.date)+'</td><td><b>'+escHtml(a.aliyah_name||'')+'</b></td>'+
            '<td>'+escHtml(a.reason||'')+'</td><td><small>'+escHtml(a.notes||'')+'</small></td></tr>';
        }).join('')+'</tbody></table></div>' : emptyState('עוד לא הייתה עלייה'))+
      '</div></div>';
      el.innerHTML = html;
    });
  });
}

function openEditMember(id) {
  gCall('getMember', {id: id}, function(m){
    if (!m) return;
    var bodyHtml = '<form id="memForm"><input type="hidden" name="id" value="'+m.id+'"><div class="row g-3">'+
      '<div class="col-md-6"><label class="form-label">שם פרטי</label><input class="form-control" name="first_name" value="'+escHtml(m.first_name)+'"></div>'+
      '<div class="col-md-6"><label class="form-label">שם משפחה</label><input class="form-control" name="last_name" value="'+escHtml(m.last_name||'')+'"></div>'+
      '<div class="col-md-6"><label class="form-label">שם האב</label><input class="form-control" name="father_name" value="'+escHtml(m.father_name||'')+'"></div>'+
      '<div class="col-md-6"><label class="form-label">שבט</label><select class="form-select" name="tribe">'+
        ['ישראל','כהן','לוי'].map(function(t){return '<option '+(t===m.tribe?'selected':'')+'>'+t+'</option>';}).join('')+
        '</select></div>'+
      '<div class="col-md-6"><label class="form-label">טלפון</label><input class="form-control" name="phone" value="'+escHtml(m.phone||'')+'"></div>'+
      '<div class="col-md-6"><label class="form-label">סטטוס</label><select class="form-select" name="status">'+
        ['active','inactive','deceased'].map(function(s){return '<option value="'+s+'" '+(s===m.status?'selected':'')+'>'+s+'</option>';}).join('')+
        '</select></div>'+
      '<div class="col-12"><label class="form-label">הערות</label><textarea class="form-control" name="notes">'+escHtml(m.notes||'')+'</textarea></div>'+
      '</div></form>';
    var footer = '<button class="btn btn-danger me-auto" onclick="deleteMemberConfirm(\''+m.id+'\')">מחק</button>'+
      '<button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>'+
      '<button class="btn btn-primary" onclick="saveEditMember()">שמור</button>';
    showModal('ערוך מתפלל', bodyHtml, footer);
  });
}

function saveEditMember() {
  var f = document.getElementById('memForm');
  var data = {};
  Array.from(f.elements).forEach(function(el){ if (el.name) data[el.name] = el.value; });
  gCall('updateMember', data, function(){
    showBanner('עודכן', 'success');
    bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
    renderMemberCard(document.getElementById('mainContent'));
  });
}

function deleteMemberConfirm(id) {
  if (!confirm('למחוק לצמיתות?')) return;
  gCall('deleteMember', {id: id}, function(){
    window.location.href = '?page=members';
  });
}

function addEventForMember(memberId) {
  openAddEvent(memberId);
}

// ============== EVENTS ==============
function renderEvents(el) {
  el.innerHTML = '<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">'+
    '<h3 class="mb-0"><i class="bi bi-calendar-event"></i> אירועים וחיובים</h3>'+
    '<button class="btn btn-primary" onclick="openAddEvent()"><i class="bi bi-plus-lg"></i> הוסף אירוע</button></div>'+
    '<div class="card"><div class="card-body"><div id="evList"><div class="skeleton" style="height:200px;"></div></div></div></div>';
  loadEventsList();
}

function loadEventsList() {
  gCall('listEvents', {synagogue_id: STATE.currentSynagogue}, function(events){
    gCall('listMembers', {synagogue_id: STATE.currentSynagogue}, function(members){
      var memMap = {};
      (members||[]).forEach(function(m){ memMap[m.id] = m; });
      var listEl = document.getElementById('evList');
      if (!events.length) { listEl.innerHTML = emptyState('אין אירועים. הוסף את הראשון!'); return; }
      listEl.innerHTML = '<div class="table-responsive"><table class="table align-middle">'+
        '<thead><tr><th>מתפלל</th><th>סוג</th><th>תאריך עברי</th><th>שבת רלוונטית</th><th>סטטוס</th><th></th></tr></thead><tbody>'+
        events.map(function(e){
          var m = memMap[e.member_id] || {};
          return '<tr><td>'+avatarHtml(m,'avatar-sm')+' '+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</td>'+
            '<td><b>'+escHtml(e.type)+'</b></td>'+
            '<td>'+escHtml(e.hebrew_day||'')+' ב'+escHtml(e.hebrew_month||'')+(e.recurring?' (חוזר)':'')+'</td>'+
            '<td>'+(e.relevant_shabbat?fmtDate(e.relevant_shabbat):'—')+'</td>'+
            '<td><span class="badge bg-'+(e.status==='done'?'success':e.status==='cancelled'?'secondary':'warning')+'">'+e.status+'</span></td>'+
            '<td><button class="btn btn-sm btn-outline-danger" onclick="deleteEv(\''+e.id+'\')"><i class="bi bi-trash"></i></button></td></tr>';
        }).join('')+'</tbody></table></div>';
    });
  });
}

function openAddEvent(memberId) {
  gCall('eventTypes', {}, function(types){
    gCall('listMembers', {synagogue_id: STATE.currentSynagogue}, function(members){
      var memOpts = (members||[]).map(function(m){
        return '<option value="'+m.id+'" '+(m.id===memberId?'selected':'')+'>'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</option>';
      }).join('');
      var typeOpts = (types||[]).map(function(t){ return '<option value="'+t+'">'+t+'</option>'; }).join('');
      var monthOpts = ['ניסן','אייר','סיון','תמוז','אב','אלול','תשרי','חשוון','כסלו','טבת','שבט','אדר','אדר_א','אדר_ב'].map(function(m){
        return '<option value="'+m+'">'+m.replace('_',' ')+'</option>';
      }).join('');
      var bodyHtml = '<form id="evForm"><div class="row g-3">'+
        '<div class="col-md-6"><label class="form-label">מתפלל *</label><select class="form-select" name="member_id" required>'+memOpts+'</select></div>'+
        '<div class="col-md-6"><label class="form-label">סוג אירוע</label><select class="form-select" name="type">'+typeOpts+'</select></div>'+
        '<div class="col-md-3"><label class="form-label">יום בחודש</label><input class="form-control" type="number" min="1" max="30" name="hebrew_day"></div>'+
        '<div class="col-md-5"><label class="form-label">חודש עברי</label><select class="form-select" name="hebrew_month">'+monthOpts+'</select></div>'+
        '<div class="col-md-4"><label class="form-label">חוזר כל שנה</label><select class="form-select" name="recurring"><option value="true">כן</option><option value="false">לא</option></select></div>'+
        '<div class="col-12"><label class="form-label">הערה</label><input class="form-control" name="notes" placeholder="לדוגמה: יארצייט אבא"></div>'+
        '</div></form>';
      var footer = '<button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>'+
        '<button class="btn btn-primary" onclick="saveEvent()">שמור</button>';
      showModal('הוסף אירוע / חיוב', bodyHtml, footer);
    });
  });
}

function saveEvent() {
  var f = document.getElementById('evForm');
  var data = {synagogue_id: STATE.currentSynagogue};
  Array.from(f.elements).forEach(function(el){ if (el.name) data[el.name] = el.value; });
  data.recurring = data.recurring === 'true';
  gCall('addEvent', data, function(){
    showBanner('נוסף!', 'success');
    bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
    if (STATE.page === 'events') loadEventsList();
  });
}

function deleteEv(id) {
  if (!confirm('למחוק?')) return;
  gCall('deleteEvent', {id: id}, function(){ loadEventsList(); });
}

// ============== REPORTS ==============
function renderReports(el) {
  el.innerHTML = '<h3 class="mb-3"><i class="bi bi-graph-up"></i> דוחות</h3>'+
    '<ul class="nav nav-pills mb-3" id="reportsTabs">'+
    '<li class="nav-item"><a class="nav-link active" href="#" onclick="loadReport(\'rotation\')">רוטציה (מי לא עלה הכי הרבה זמן)</a></li>'+
    '<li class="nav-item"><a class="nav-link" href="#" onclick="loadReport(\'fairness\')">חלוקה</a></li>'+
    '<li class="nav-item"><a class="nav-link" href="#" onclick="loadReport(\'absent\')">לא עלו 90+ יום</a></li>'+
    '<li class="nav-item"><a class="nav-link" href="#" onclick="loadReport(\'tribes\')">חלוקה לשבטים</a></li>'+
    '<li class="nav-item"><a class="nav-link" href="#" onclick="loadReport(\'obligations\')">חיובים פתוחים</a></li>'+
    '</ul>'+
    '<div class="card"><div class="card-body" id="reportBody"><div class="skeleton" style="height:300px;"></div></div></div>';
  loadReport('rotation');
}

function loadReport(name) {
  Array.from(document.querySelectorAll('#reportsTabs .nav-link')).forEach(function(a){ a.classList.remove('active'); });
  event && event.target && event.target.classList && event.target.classList.add('active');
  var body = document.getElementById('reportBody');
  body.innerHTML = '<div class="skeleton" style="height:200px;"></div>';
  if (name === 'rotation') {
    gCall('reportRotation', {synagogue_id: STATE.currentSynagogue}, function(rows){
      body.innerHTML = '<div class="table-responsive"><table class="table">'+
        '<thead><tr><th>#</th><th>מתפלל</th><th>שבט</th><th>עלייה אחרונה</th><th>זמן שעבר</th></tr></thead><tbody>'+
        rows.slice(0, 50).map(function(m,i){
          return '<tr><td>'+(i+1)+'</td><td>'+avatarHtml(m,'avatar-sm')+' '+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</td>'+
            '<td>'+tribeBadge(m.tribe)+'</td>'+
            '<td>'+(m.last_aliyah_date==='—'?'מעולם לא':fmtDate(m.last_aliyah_date))+'</td>'+
            '<td><b>'+daysSince(m.last_aliyah_date)+'</b></td></tr>';
        }).join('')+'</tbody></table></div>';
    });
  } else if (name === 'fairness') {
    gCall('reportFairness', {synagogue_id: STATE.currentSynagogue, months: 6}, function(d){
      var rows = d.members || [];
      body.innerHTML = '<p class="text-muted">חצי שנה אחורה</p><div class="table-responsive"><table class="table"><thead><tr><th>#</th><th>מתפלל</th><th>שבט</th><th>עליות</th></tr></thead><tbody>'+
        rows.slice(0,50).map(function(m,i){
          return '<tr><td>'+(i+1)+'</td><td>'+avatarHtml(m,'avatar-sm')+' '+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</td>'+
            '<td>'+tribeBadge(m.tribe)+'</td><td><b>'+m.count+'</b></td></tr>';
        }).join('')+'</tbody></table></div>';
    });
  } else if (name === 'absent') {
    gCall('reportLongAbsent', {synagogue_id: STATE.currentSynagogue, days: 90}, function(rows){
      body.innerHTML = '<p class="text-muted">'+rows.length+' מתפללים</p><div class="table-responsive"><table class="table"><thead><tr><th>#</th><th>מתפלל</th><th>שבט</th><th>עלייה אחרונה</th></tr></thead><tbody>'+
        rows.map(function(m,i){
          return '<tr><td>'+(i+1)+'</td><td>'+avatarHtml(m,'avatar-sm')+' '+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</td>'+
            '<td>'+tribeBadge(m.tribe)+'</td><td>'+(m.last_aliyah_date==='מעולם לא'?'<b class="text-danger">מעולם לא</b>':fmtDate(m.last_aliyah_date))+'</td></tr>';
        }).join('')+'</tbody></table></div>';
    });
  } else if (name === 'tribes') {
    gCall('reportTribes', {synagogue_id: STATE.currentSynagogue}, function(d){
      body.innerHTML = '<div class="row g-3 mb-3">'+
        '<div class="col-md-4">'+statCard('כהנים', d.counts.cohen, 'bi-star', 'stat-card')+'</div>'+
        '<div class="col-md-4">'+statCard('לויים', d.counts.levi, 'bi-star-half', 'stat-card-purple')+'</div>'+
        '<div class="col-md-4">'+statCard('ישראל', d.counts.israel, 'bi-people', 'stat-card-green')+'</div>'+
        '</div>'+
        ['cohen','levi','israel'].map(function(k){
          var arr = d[k]||[];
          var title = k==='cohen'?'כהנים':k==='levi'?'לויים':'ישראל';
          return '<h6 class="mt-3">'+title+' ('+arr.length+')</h6><div class="d-flex flex-wrap gap-1">'+
            arr.map(function(m){return '<a href="?page=member_card&id='+m.id+'" class="badge bg-light text-dark text-decoration-none p-2">'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</a>';}).join('')+'</div>';
        }).join('');
    });
  } else if (name === 'obligations') {
    gCall('reportOpenObligations', {synagogue_id: STATE.currentSynagogue}, function(rows){
      gCall('listMembers', {synagogue_id: STATE.currentSynagogue}, function(members){
        var memMap = {};
        members.forEach(function(m){memMap[m.id]=m;});
        body.innerHTML = '<div class="table-responsive"><table class="table"><thead><tr><th>מתפלל</th><th>סוג</th><th>תאריך</th><th>סטטוס</th></tr></thead><tbody>'+
          rows.map(function(e){
            var m = memMap[e.member_id]||{};
            return '<tr><td>'+escHtml((m.first_name||'')+' '+(m.last_name||''))+'</td><td>'+escHtml(e.type)+'</td>'+
              '<td>'+escHtml(e.hebrew_day||'')+' ב'+escHtml(e.hebrew_month||'')+'</td>'+
              '<td><span class="badge bg-warning">'+e.status+'</span></td></tr>';
          }).join('')+'</tbody></table></div>';
      });
    });
  }
}

// ============== SETTINGS ==============
function renderSettings(el) {
  gCall('listGabbais', {}, function(gabs){
    gCall('listSynagogues', {}, function(syns){
      var html = '<h3 class="mb-3"><i class="bi bi-gear"></i> הגדרות</h3>'+
        '<div class="card mb-3"><div class="card-header">בתי כנסת</div><div class="card-body">'+
        '<ul class="list-group">'+
        syns.map(function(s){ return '<li class="list-group-item">'+escHtml(s.name)+' <small class="text-muted">'+escHtml(s.address||'')+'</small></li>'; }).join('')+
        '</ul></div></div>'+
        '<div class="card mb-3"><div class="card-header">גבאים</div><div class="card-body">'+
        '<button class="btn btn-sm btn-primary mb-2" onclick="openAddGabbai()"><i class="bi bi-plus-lg"></i> הוסף גבאי</button>'+
        '<ul class="list-group">'+
        gabs.map(function(g){
          var syn = syns.find(function(s){return s.id===g.synagogue_id;})||{};
          return '<li class="list-group-item d-flex justify-content-between">'+
            '<div><b>'+escHtml(g.name)+'</b> <small class="text-muted">קוד: '+escHtml(g.pin_code)+' · '+escHtml(g.role)+' · '+escHtml(syn.name||'')+'</small></div></li>';
        }).join('')+
        '</ul></div></div>'+
        '<div class="card"><div class="card-body"><h6>פעולות מתקדמות</h6>'+
        '<button class="btn btn-outline-secondary" onclick="window.open(SHEET_URL,\'_blank\')"><i class="bi bi-table"></i> פתח את ה־Sheet הגולמי</button>'+
        '</div></div>';
      el.innerHTML = html;
    });
  });
}

function openAddGabbai() {
  var bodyHtml = '<form id="gForm"><div class="row g-3">'+
    '<div class="col-md-6"><label class="form-label">שם</label><input class="form-control" name="name" required></div>'+
    '<div class="col-md-6"><label class="form-label">טלפון</label><input class="form-control" name="phone"></div>'+
    '<div class="col-md-6"><label class="form-label">קוד 4 ספרות</label><input class="form-control" name="pin_code" maxlength="4" pattern="[0-9]{4}" required></div>'+
    '<div class="col-md-6"><label class="form-label">בית כנסת</label><select class="form-select" name="synagogue_id">'+
      STATE.synagogues.map(function(s){return '<option value="'+s.id+'">'+escHtml(s.name)+'</option>';}).join('')+
      '</select></div>'+
    '<div class="col-12"><label class="form-label">תפקיד</label><select class="form-select" name="role">'+
      '<option value="secondary">גבאי משני</option><option value="chief">גבאי ראשי</option><option value="super_admin">מנהל על</option>'+
      '</select></div>'+
    '</div></form>';
  var footer = '<button class="btn btn-secondary" data-bs-dismiss="modal">ביטול</button>'+
    '<button class="btn btn-primary" onclick="saveGabbai()">שמור</button>';
  showModal('הוסף גבאי', bodyHtml, footer);
}

function saveGabbai() {
  var f = document.getElementById('gForm');
  var data = {status: 'active'};
  Array.from(f.elements).forEach(function(el){ if (el.name) data[el.name] = el.value; });
  gCall('addGabbai', data, function(){
    showBanner('נוסף', 'success');
    bootstrap.Modal.getInstance(document.getElementById('appModal')).hide();
    renderSettings(document.getElementById('mainContent'));
  });
}
</script>
